<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редагувати оголошення</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(1100px 650px at 12% 8%, rgba(255, 255, 255, 0.14), transparent 58%),
                radial-gradient(900px 580px at 86% 10%, rgba(173, 146, 233, 0.28), transparent 60%),
                linear-gradient(155deg, #58448b 0%, #6a56a0 52%, #7a67b4 100%);
            background-attachment: fixed;
        }
        .card {
            width: min(92vw, 760px);
            background: #fff;
            border-radius: 18px;
            padding: 18px;
        }
        h1 { margin: 0 0 12px; color: #5e4f88; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .grid .full { grid-column: 1 / -1; }
        input, select, textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            font-family: inherit;
        }
        .form_control {
        color: #4a90e2;
}
        textarea { min-height: 100px; resize: vertical; }
        .actions {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }
        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            flex: 1;
        }
        .btn-save { background: #97b3ef; color: #fff; }
        .btn-back { background: #f0f0f0; color: #444; }

        .btn:hover {
            transform: scale(1.03); /* Збільшення на 5% */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-save:hover {
            background: #87a0d7;
        }
        .btn-back:hover {
            background: #e8e6f9;
        }

    </style>
</head>
<body>
    <form class="card" action="{% url 'edit_listing' listing.id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <h1>Редагувати оголошення</h1>
        <div class="grid">
            <input type="text" name="title" value="{{ listing.title }}" placeholder="Назва книги" required>
            <input type="text" name="author" value="{{ listing.author }}" placeholder="Автор">
            <input type="number" name="publication_year" min="1000" max="2100" value="{{ listing.publication_year|default:'' }}" placeholder="Рік видання">
            <div class="form-group">
            <select name="language" id="language" class="form-control">
                <option value="" {% if not listing.language %}selected{% endif %}>Оберіть мову</option>
                <option value="Українська" {% if listing.language == "Українська" %}selected{% endif %}>Українська</option>
                <option value="Англійська" {% if listing.language == "Англійська" %}selected{% endif %}>Англійська</option>
                <option value="Німецька" {% if listing.language == "Німецька" %}selected{% endif %}>Німецька</option>
                <option value="Польська" {% if listing.language == "Польська" %}selected{% endif %}>Польська</option>
                <option value="Французька" {% if listing.language == "Французька" %}selected{% endif %}>Французька</option>
                <option value="Інша" {% if listing.language == "Інша" %}selected{% endif %}>Інша</option>
            </select>
        </div>
            <input type="number" name="pages" min="1" value="{{ listing.pages|default:'' }}" placeholder="Кількість сторінок">
        <div class="form-group">
            <select name="genre" id="genre" class="form-control">
                <option value="" {% if not listing.genre %}selected{% endif %}>Усі жанри</option>
                <option value="fantasy" {% if listing.genre == "fantasy" %}selected{% endif %}>Фентезі</option>
            <option value="romance" {% if listing.genre == "romance" %}selected{% endif %}>Романтика</option>
            <option value="detective" {% if listing.genre == "detective" %}selected{% endif %}>Детектив</option>
            <option value="thriller" {% if listing.genre == "thriller" %}selected{% endif %}>Трилер</option>
            <option value="scifi" {% if listing.genre == "scifi" %}selected{% endif %}>Наукова фантастика</option>
            <option value="classic" {% if listing.genre == "classic" %}selected{% endif %}>Класика</option>
            <option value="psychology" {% if listing.genre == "psychology" %}selected{% endif %}>Психологія</option>
            <option value="selfhelp" {% if listing.genre == "selfhelp" %}selected{% endif %}>Саморозвиток</option>
            <option value="history" {% if listing.genre == "history" %}selected{% endif %}>Історія</option>
            <option value="business" {% if listing.genre == "business" %}selected{% endif %}>Бізнес</option>
            </select>
        </div>
            <select name="condition">
                <option value="" {% if not listing.condition %}selected{% endif %}>Стан книги</option>
                <option value="almost_new" {% if listing.condition == 'almost_new' %}selected{% endif %}>Almost new</option>
                <option value="average" {% if listing.condition == 'average' %}selected{% endif %}>Average condition</option>
                <option value="poor" {% if listing.condition == 'poor' %}selected{% endif %}>Poor condition</option>
            </select>
            <input type="text" name="hashtags" value="{{ listing.hashtags }}" placeholder="Хештеги">
            <input class="full" type="file" name="image" accept="image/*">
            <input class="full" type="url" name="image_url" value="{{ listing.image_url }}" placeholder="URL фото (необов'язково)">
            <textarea class="full" name="description" placeholder="Опис" required>{{ listing.description }}</textarea>
        </div>
        <div class="actions">
            <a class="btn btn-back" href="{% url 'profile' %}">Назад</a>
            <button class="btn btn-save" type="submit">Зберегти</button>
        </div>
    </form>
</body>
</html>
