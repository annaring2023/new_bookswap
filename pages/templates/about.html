{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Про нас - BookSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(155deg, #58448b 0%, #6a56a0 52%, #7a6f9c 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .logo {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            text-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: inline-block;
            margin-bottom: 30px;
            transition: transform 0.2s ease;
        }
        .logo:hover {
            transform: scale(1.05);
        }
        .info-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
        }
        h1 { margin-top: 0; }
        p { font-size: 1.1rem; line-height: 1.6; opacity: 0.9; }
        .email {
            font-weight: bold;
            color: #2d0b2c; /* Золотистий колір для акценту */
            text-decoration: none;
        }
        a{
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'home' %}" class="logo">BookSwap💜</a>

        <div class="info-card">
            <h1>Про проєкт</h1>
            <p>
                Ми прагнемо дати кожній книзі друге життя. <br>
                Якщо ви знайшли помилку або маєте пропозиції, будь ласка, напишіть нам:
            </p>
            <p>
                <a href="mailto:rinh.pn@ucu.edu.ua" class="email">rinh.pn@ucu.edu.ua</a>
            </p>
        </div>
    </div>
</body>
</html>
