<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налаштування - BookSwap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(1100px 650px at 12% 8%, rgba(255, 255, 255, 0.14), transparent 58%),
                radial-gradient(900px 580px at 86% 10%, rgba(173, 146, 233, 0.28), transparent 60%),
                linear-gradient(155deg, #58448b 0%, #6a56a0 52%, #7a67b4 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #2f2f39;
            padding: 24px;
        }
        .card {
            width: min(94vw, 520px);
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            padding: 28px 26px;
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 18px 34px rgba(88, 73, 164, 0.2);
        }
        .head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .head-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #eef1ff;
            color: #6c5dd3;
        }
        .head-icon svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        h1 {
            margin: 0;
            font-size: 30px;
            color: #6c5dd3;
        }
        .sub {
            margin: 0 0 18px;
            color: #646079;
            font-size: 15px;
            line-height: 1.45;
        }
        .meta {
            margin: 0 0 20px;
            padding: 12px;
            border-radius: 14px;
            background: #f4f6ff;
            color: #4e4a66;
            font-size: 14px;
        }
        .actions {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        .actions form {
            flex: 1;
            margin: 0;
            display: flex;
        }
        .actions form .btn {
            width: 100%;
        }
        .btn {
            border: none;
            border-radius: 14px;
            padding: 12px 16px;
            font-weight: 700;
            font-size: 16px;
            line-height: 1.2;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            flex: 1;
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform .15s ease, box-shadow .2s ease, background-color .2s ease;
        }
        .btn-back {
            background: #ecf1ff;
            color: #4a5885;
            border: 1px solid #dbe5fb;
        }
        .btn-logout {
            background: #97b3ef;
            color: #fff;
            box-shadow: 0 8px 16px rgba(96, 133, 181, 0.3);
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .btn-back:hover {
            background: #e3ebff;
        }
        .btn-logout:hover {
            background: #5f87bc;
            box-shadow: 0 12px 20px rgba(96, 133, 181, 0.38);
        }

        @media (max-width: 520px) {
            .card {
                padding: 22px 18px;
            }
            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <section class="card">
        <div class="head">
            <span class="head-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M10.6 2.3h2.8l.5 2.1a7.8 7.8 0 0 1 1.9.8l1.9-1.1 2 2-1.1 1.9c.3.6.6 1.2.8 1.9l2.1.5v2.8l-2.1.5a7.8 7.8 0 0 1-.8 1.9l1.1 1.9-2 2-1.9-1.1a7.8 7.8 0 0 1-1.9.8l-.5 2.1h-2.8l-.5-2.1a7.8 7.8 0 0 1-1.9-.8L6.9 20l-2-2 1.1-1.9a7.8 7.8 0 0 1-.8-1.9L3 13.7v-2.8l2.1-.5c.2-.7.5-1.3.8-1.9L4.9 6.6l2-2 1.9 1.1c.6-.3 1.2-.6 1.9-.8l.5-2.1ZM12 8.6a3.4 3.4 0 1 0 0 6.8 3.4 3.4 0 0 0 0-6.8Z"/></svg>
            </span>
            <h1>Налаштування</h1>
        </div>
        <p class="sub">Керуйте сесією акаунту і переходом між основними сторінками.</p>
        <p class="meta">Поточний користувач: <strong>{{ request.user.username }}</strong></p>

        <div class="actions">
            <a href="{% url 'catalog' %}" class="btn btn-back">Назад у каталог</a>
            <form action="{% url 'logout_user' %}" method="post">
                {% csrf_token %}
                <button class="btn btn-logout" type="submit">Вийти з акаунту</button>
            </form>
        </div>
    </section>
</body>
</html>
